name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Publish Rimshot
        shell: bash
        run: dotnet publish Rimshot/Rimshot.csproj -c Release -r win-x64 --self-contained true -o out/Rimshot -p:Version=${{ steps.version.outputs.version }}
      - name: Publish Inspector
        shell: bash
        run: dotnet publish Rimshot.Inspector/Rimshot.Inspector.csproj -c Release -r win-x64 --self-contained true -o out/Rimshot/Inspector -p:Version=${{ steps.version.outputs.version }}
      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyVersion=${{ steps.version.outputs.version }} `
            installer/Rimshot.iss
          Move-Item installer/Rimshot-windows-x64.exe Rimshot-windows-x64.exe
      - uses: actions/upload-artifact@v7
        with:
          name: Rimshot-windows-x64
          path: Rimshot-windows-x64.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Publish Rimshot
        run: dotnet publish Rimshot/Rimshot.csproj -c Release -r linux-x64 --self-contained true -o out/Rimshot -p:Version=${{ steps.version.outputs.version }}
      - name: Publish Inspector
        run: dotnet publish Rimshot.Inspector/Rimshot.Inspector.csproj -c Release -r linux-x64 --self-contained true -o out/Rimshot/Inspector -p:Version=${{ steps.version.outputs.version }}
      - name: Tarball
        run: |
          chmod +x out/Rimshot/Rimshot
          chmod +x out/Rimshot/Inspector/Rimshot.Inspector
          tar -czvf Rimshot-linux-x64.tar.gz -C out Rimshot
      - uses: actions/upload-artifact@v7
        with:
          name: Rimshot-linux-x64
          path: Rimshot-linux-x64.tar.gz
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
